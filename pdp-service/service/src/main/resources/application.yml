server:
  port: 8080

spring:
  application:
    name: pdp-service
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/personal_dev_plan?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  ai:
    openai:
      api-key: sk-1b7e7f68f3504809948a0d02fcaf90c2
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: kimi-k2.6
          temperature: 0.7
          max-tokens: 4096

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.slow.pojo.entity

pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

app:
  upload:
    path: ${user.dir}/service/src/main/resources/static/upload

logging:
  level:
    com.slow: debug
