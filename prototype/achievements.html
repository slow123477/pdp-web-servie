<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>成就管理 - 成长规划</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'ZCOOL XiaoWei', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Georgia', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.25rem; --text-xl: 1.5rem; --text-2xl: 2rem;
      --space-xs: 0.25rem; --space-sm: 0.5rem; --space-md: 0.75rem;
      --space-lg: 1rem; --space-xl: 1.5rem; --space-2xl: 2rem; --space-3xl: 3rem;
      --bg-base: oklch(98% 0.008 30);
      --bg-surface: oklch(96% 0.012 30);
      --bg-surface-hover: oklch(94% 0.015 30);
      --border-subtle: oklch(88% 0.015 30);
      --text-primary: oklch(25% 0.02 30);
      --text-secondary: oklch(48% 0.025 30);
      --text-tertiary: oklch(62% 0.02 30);
      --color-primary: oklch(70% 0.14 20);
      --color-primary-deep: oklch(58% 0.16 20);
      --color-primary-light: oklch(85% 0.08 20);
      --color-primary-bg: oklch(96% 0.02 20);
      --color-achievement: oklch(70% 0.14 75);
      --color-achievement-bg: oklch(96% 0.025 75);
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
      --shadow-sm: 0 1px 2px oklch(70% 0.01 30 / 0.06);
      --shadow-md: 0 4px 12px oklch(70% 0.01 30 / 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); font-size: var(--text-base); line-height: 1.6; color: var(--text-primary); background: var(--bg-base); }
    h1, h2, h3 { font-family: var(--font-display); font-weight: 400; line-height: 1.25; }

    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-md) var(--space-2xl); background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: var(--space-sm); }
    .nav-logo { font-size: var(--text-xl); }
    .nav-title { font-family: var(--font-display); font-size: var(--text-lg); }
    .nav-links { display: flex; gap: var(--space-xs); }
    .nav-link { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-sm); font-size: var(--text-sm); color: var(--text-secondary); transition: all 0.2s; }
    .nav-link:hover { color: var(--text-primary); background: var(--bg-base); }
    .nav-link.is-active { color: var(--color-primary-deep); background: var(--color-primary-bg); }
    .nav-user { display: flex; align-items: center; gap: var(--space-md); }
    .user-name { font-size: var(--text-sm); color: var(--text-secondary); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--color-primary-light); color: var(--color-primary-deep); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: var(--text-sm); border: 2px solid var(--bg-base); }

    .page { max-width: 1280px; margin: 0 auto; padding: var(--space-3xl) var(--space-2xl); }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-xl); }
    .page-title { font-size: var(--text-2xl); }
    .btn-primary {
      padding: var(--space-sm) var(--space-lg); background: var(--color-primary); color: white;
      border: none; border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--color-primary-deep); box-shadow: var(--shadow-md); transform: translateY(-1px); }

    .filter-bar { display: flex; gap: var(--space-md); margin-bottom: var(--space-xl); }
    .filter-bar select { padding: var(--space-sm) var(--space-md); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); font-family: inherit; font-size: var(--text-sm); color: var(--text-primary); background: var(--bg-surface); cursor: pointer; }

    /* Achievement Grid */
    .achievement-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: var(--space-lg);
    }
    .achievement-card {
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); padding: var(--space-xl);
      transition: all 0.2s;
    }
    .achievement-card:hover { background: var(--bg-surface-hover); box-shadow: var(--shadow-sm); transform: translateY(-2px); }
    .achievement-header { display: flex; align-items: center; gap: var(--space-md); margin-bottom: var(--space-md); }
    .achievement-icon { width: 48px; height: 48px; border-radius: var(--radius-md); background: var(--color-achievement-bg); display: flex; align-items: center; justify-content: center; font-size: var(--text-xl); flex-shrink: 0; }
    .achievement-level {
      font-size: var(--text-xs); padding: 2px 10px; border-radius: 100px;
      background: var(--color-achievement-bg); color: var(--color-achievement); font-weight: 500;
    }
    .achievement-name { font-family: var(--font-display); font-size: var(--text-lg); margin-bottom: var(--space-sm); }
    .achievement-meta { font-size: var(--text-sm); color: var(--text-secondary); }
    .achievement-meta span + span::before { content: ' · '; color: var(--text-tertiary); }

    @media (max-width: 768px) {
      .page { padding: var(--space-xl) var(--space-lg); }
      .page-header { flex-direction: column; align-items: flex-start; gap: var(--space-md); }
      .achievement-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-brand"><span class="nav-logo">🌱</span><span class="nav-title">成长规划</span></div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">首页</a>
      <a href="courses.html" class="nav-link">课程</a>
      <a href="experiences.html" class="nav-link">经历</a>
      <a href="achievements.html" class="nav-link is-active">成就</a>
      <a href="roles.html" class="nav-link">角色</a>
      <a href="ai-analysis.html" class="nav-link">AI分析</a>
    </div>
    <div class="nav-user"><span class="user-name">小明</span><a href="settings.html"><div class="user-avatar">明</div></a></div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1 class="page-title">成就管理</h1>
      <button class="btn-primary">+ 添加成就</button>
    </div>

    <div class="filter-bar">
      <select><option>全部级别</option><option>国家级</option><option>省级</option><option>校级</option></select>
      <select><option>时间倒序</option><option>时间正序</option></select>
    </div>

    <div class="achievement-grid">
      <div class="achievement-card">
        <div class="achievement-header">
          <div class="achievement-icon">🏆</div>
          <span class="achievement-level">国家级</span>
        </div>
        <div class="achievement-name">全国大学生数学建模竞赛一等奖</div>
        <div class="achievement-meta"><span>中国工业与应用数学学会</span><span>2026年4月</span></div>
      </div>
      <div class="achievement-card">
        <div class="achievement-header">
          <div class="achievement-icon">🥈</div>
          <span class="achievement-level">省级</span>
        </div>
        <div class="achievement-name">ACM 程序设计竞赛银牌</div>
        <div class="achievement-meta"><span>省计算机学会</span><span>2025年11月</span></div>
      </div>
      <div class="achievement-card">
        <div class="achievement-header">
          <div class="achievement-icon">📜</div>
          <span class="achievement-level">省级</span>
        </div>
        <div class="achievement-name">优秀大学生奖学金</div>
        <div class="achievement-meta"><span>省教育厅</span><span>2025年10月</span></div>
      </div>
      <div class="achievement-card">
        <div class="achievement-header">
          <div class="achievement-icon">⭐</div>
          <span class="achievement-level">校级</span>
        </div>
        <div class="achievement-name">三好学生</div>
        <div class="achievement-meta"><span>学校</span><span>2025年9月</span></div>
      </div>
      <div class="achievement-card">
        <div class="achievement-header">
          <div class="achievement-icon">🎖️</div>
          <span class="achievement-level">国家级</span>
        </div>
        <div class="achievement-name">国家励志奖学金</div>
        <div class="achievement-meta"><span>教育部</span><span>2025年9月</span></div>
      </div>
      <div class="achievement-card">
        <div class="achievement-header">
          <div class="achievement-icon">🏅</div>
          <span class="achievement-level">校级</span>
        </div>
        <div class="achievement-name">优秀学生干部</div>
        <div class="achievement-meta"><span>学校</span><span>2025年6月</span></div>
      </div>
    </div>
  </main>
</body>
</html>
