<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课程管理 - 成长规划</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'ZCOOL XiaoWei', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Georgia', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.25rem; --text-xl: 1.5rem; --text-2xl: 2rem;
      --space-xs: 0.25rem; --space-sm: 0.5rem; --space-md: 0.75rem;
      --space-lg: 1rem; --space-xl: 1.5rem; --space-2xl: 2rem; --space-3xl: 3rem;
      --bg-base: oklch(98% 0.008 30);
      --bg-surface: oklch(96% 0.012 30);
      --bg-surface-hover: oklch(94% 0.015 30);
      --border-subtle: oklch(88% 0.015 30);
      --text-primary: oklch(25% 0.02 30);
      --text-secondary: oklch(48% 0.025 30);
      --text-tertiary: oklch(62% 0.02 30);
      --color-primary: oklch(70% 0.14 20);
      --color-primary-deep: oklch(58% 0.16 20);
      --color-primary-light: oklch(85% 0.08 20);
      --color-primary-bg: oklch(96% 0.02 20);
      --color-course: oklch(68% 0.12 195);
      --color-course-bg: oklch(96% 0.02 195);
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
      --shadow-sm: 0 1px 2px oklch(70% 0.01 30 / 0.06);
      --shadow-md: 0 4px 12px oklch(70% 0.01 30 / 0.08);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--font-body); font-size: var(--text-base); line-height: 1.6; color: var(--text-primary); background: var(--bg-base); }
    h1, h2, h3 { font-family: var(--font-display); font-weight: 400; line-height: 1.25; }

    /* Nav */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-md) var(--space-2xl);
      background: var(--bg-surface); border-bottom: 1px solid var(--border-subtle); position: sticky; top: 0; z-index: 100;
    }
    .nav-brand { display: flex; align-items: center; gap: var(--space-sm); }
    .nav-logo { font-size: var(--text-xl); }
    .nav-title { font-family: var(--font-display); font-size: var(--text-lg); }
    .nav-links { display: flex; gap: var(--space-xs); }
    .nav-link { padding: var(--space-sm) var(--space-md); border-radius: var(--radius-sm); font-size: var(--text-sm); color: var(--text-secondary); transition: all 0.2s; }
    .nav-link:hover { color: var(--text-primary); background: var(--bg-base); }
    .nav-link.is-active { color: var(--color-primary-deep); background: var(--color-primary-bg); }
    .nav-user { display: flex; align-items: center; gap: var(--space-md); }
    .user-name { font-size: var(--text-sm); color: var(--text-secondary); }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--color-primary-light); color: var(--color-primary-deep); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-size: var(--text-sm); border: 2px solid var(--bg-base); }

    /* Page */
    .page { max-width: 1280px; margin: 0 auto; padding: var(--space-3xl) var(--space-2xl); }
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-xl); }
    .page-title { font-size: var(--text-2xl); }
    .btn-primary {
      padding: var(--space-sm) var(--space-lg); background: var(--color-primary); color: white;
      border: none; border-radius: var(--radius-md); font-size: var(--text-sm); font-weight: 500;
      font-family: inherit; cursor: pointer; transition: all 0.2s;
    }
    .btn-primary:hover { background: var(--color-primary-deep); box-shadow: var(--shadow-md); transform: translateY(-1px); }

    /* Filter */
    .filter-bar { display: flex; gap: var(--space-md); margin-bottom: var(--space-xl); }
    .filter-bar select {
      padding: var(--space-sm) var(--space-md); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); font-family: inherit; font-size: var(--text-sm);
      color: var(--text-primary); background: var(--bg-surface); cursor: pointer;
    }

    /* Course List */
    .course-list { display: flex; flex-direction: column; gap: var(--space-md); }
    .course-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-lg) var(--space-xl);
      background: var(--bg-surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg); transition: all 0.2s;
    }
    .course-item:hover { background: var(--bg-surface-hover); box-shadow: var(--shadow-sm); }
    .course-info { display: flex; align-items: center; gap: var(--space-md); }
    .course-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); background: var(--color-course-bg); color: var(--color-course); display: flex; align-items: center; justify-content: center; font-size: var(--text-lg); flex-shrink: 0; }
    .course-name { font-family: var(--font-display); font-size: var(--text-lg); }
    .course-tag {
      font-size: var(--text-xs); padding: 2px 10px; border-radius: 100px;
      background: var(--color-course-bg); color: var(--color-course); font-weight: 500;
    }
    .course-meta { display: flex; align-items: center; gap: var(--space-xl); }
    .course-meta span { font-size: var(--text-sm); color: var(--text-secondary); }
    .course-grade {
      font-family: var(--font-display); font-size: var(--text-xl); color: var(--color-primary-deep);
      min-width: 40px; text-align: center;
    }

    @media (max-width: 768px) {
      .page { padding: var(--space-xl) var(--space-lg); }
      .page-header { flex-direction: column; align-items: flex-start; gap: var(--space-md); }
      .course-item { flex-direction: column; align-items: flex-start; gap: var(--space-md); }
      .course-meta { width: 100%; justify-content: space-between; }
      .nav-links { display: none; }
    }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-brand">
      <span class="nav-logo">🌱</span>
      <span class="nav-title">成长规划</span>
    </div>
    <div class="nav-links">
      <a href="dashboard.html" class="nav-link">首页</a>
      <a href="courses.html" class="nav-link is-active">课程</a>
      <a href="experiences.html" class="nav-link">经历</a>
      <a href="achievements.html" class="nav-link">成就</a>
      <a href="roles.html" class="nav-link">角色</a>
      <a href="ai-analysis.html" class="nav-link">AI分析</a>
    </div>
    <div class="nav-user">
      <span class="user-name">小明</span>
      <a href="settings.html"><div class="user-avatar">明</div></a>
    </div>
  </nav>

  <main class="page">
    <div class="page-header">
      <h1 class="page-title">课程管理</h1>
      <button class="btn-primary">+ 添加课程</button>
    </div>

    <div class="filter-bar">
      <select><option>全部学期</option><option>大一上</option><option>大一下</option><option>大二上</option><option>大二下</option><option>大三上</option><option>大三下</option></select>
      <select><option>全部类型</option><option>必修</option><option>选修</option><option>通识</option></select>
    </div>

    <div class="course-list">
      <div class="course-item">
        <div class="course-info">
          <div class="course-icon">📖</div>
          <div>
            <div class="course-name">数据结构与算法</div>
          </div>
          <span class="course-tag">必修</span>
        </div>
        <div class="course-meta">
          <span>4 学分</span>
          <span>大三下</span>
          <span class="course-grade">92</span>
        </div>
      </div>
      <div class="course-item">
        <div class="course-info">
          <div class="course-icon">📖</div>
          <div>
            <div class="course-name">机器学习导论</div>
          </div>
          <span class="course-tag">选修</span>
        </div>
        <div class="course-meta">
          <span>3 学分</span>
          <span>大三下</span>
          <span class="course-grade">88</span>
        </div>
      </div>
      <div class="course-item">
        <div class="course-info">
          <div class="course-icon">📖</div>
          <div>
            <div class="course-name">软件工程实践</div>
          </div>
          <span class="course-tag">必修</span>
        </div>
        <div class="course-meta">
          <span>3 学分</span>
          <span>大三下</span>
          <span class="course-grade">95</span>
        </div>
      </div>
      <div class="course-item">
        <div class="course-info">
          <div class="course-icon">📖</div>
          <div>
            <div class="course-name">大学英语（四）</div>
          </div>
          <span class="course-tag">通识</span>
        </div>
        <div class="course-meta">
          <span>2 学分</span>
          <span>大三下</span>
          <span class="course-grade">85</span>
        </div>
      </div>
      <div class="course-item">
        <div class="course-info">
          <div class="course-icon">📖</div>
          <div>
            <div class="course-name">计算机网络</div>
          </div>
          <span class="course-tag">必修</span>
        </div>
        <div class="course-meta">
          <span>3 学分</span>
          <span>大三上</span>
          <span class="course-grade">90</span>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
