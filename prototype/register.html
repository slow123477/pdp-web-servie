<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 成长规划</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-display: 'ZCOOL XiaoWei', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Georgia', serif;
      --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;

      --text-xs: 0.75rem; --text-sm: 0.875rem; --text-base: 1rem;
      --text-lg: 1.25rem; --text-xl: 1.5rem; --text-2xl: 2rem; --text-3xl: 2.5rem;

      --space-xs: 0.25rem; --space-sm: 0.5rem; --space-md: 0.75rem;
      --space-lg: 1rem; --space-xl: 1.5rem; --space-2xl: 2rem; --space-3xl: 3rem;

      --bg-base: oklch(98% 0.008 30);
      --bg-surface: oklch(96% 0.012 30);
      --bg-surface-hover: oklch(94% 0.015 30);
      --border-subtle: oklch(88% 0.015 30);
      --border-strong: oklch(78% 0.02 30);

      --text-primary: oklch(25% 0.02 30);
      --text-secondary: oklch(48% 0.025 30);
      --text-tertiary: oklch(62% 0.02 30);

      --color-primary: oklch(70% 0.14 20);
      --color-primary-deep: oklch(58% 0.16 20);
      --color-primary-light: oklch(85% 0.08 20);

      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
      --shadow-sm: 0 1px 2px oklch(70% 0.01 30 / 0.06);
      --shadow-md: 0 4px 12px oklch(70% 0.01 30 / 0.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.6;
      color: var(--text-primary);
      background: var(--bg-base);
      min-height: 100vh;
    }

    .auth-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .auth-brand {
      background: linear-gradient(160deg, oklch(92% 0.06 20), oklch(88% 0.08 30));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-3xl);
      position: relative;
      overflow: hidden;
    }

    .auth-brand::before {
      content: ''; position: absolute; top: -100px; right: -100px;
      width: 300px; height: 300px; border-radius: 50%;
      background: oklch(85% 0.1 20 / 0.2);
    }
    .auth-brand::after {
      content: ''; position: absolute; bottom: -60px; left: -60px;
      width: 200px; height: 200px; border-radius: 50%;
      background: oklch(90% 0.08 55 / 0.15);
    }

    .brand-content { position: relative; z-index: 1; text-align: center; }
    .brand-logo { font-size: 4rem; line-height: 1; margin-bottom: var(--space-lg); display: block; }
    .brand-title { font-family: var(--font-display); font-size: var(--text-3xl); color: var(--color-primary-deep); margin-bottom: var(--space-md); }
    .brand-desc { font-size: var(--text-base); color: var(--text-secondary); max-width: 32ch; margin: 0 auto; line-height: 1.7; }

    .auth-form-container {
      display: flex; align-items: center; justify-content: center;
      padding: var(--space-3xl);
    }
    .auth-card { width: 100%; max-width: 400px; }
    .form-title { font-family: var(--font-display); font-size: var(--text-2xl); margin-bottom: var(--space-xs); color: var(--text-primary); }
    .form-subtitle { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-2xl); }

    .form-group { margin-bottom: var(--space-lg); }
    .form-group label { display: block; font-size: var(--text-sm); font-weight: 500; color: var(--text-primary); margin-bottom: var(--space-sm); }
    .form-group input {
      width: 100%; padding: var(--space-md) var(--space-lg);
      border: 1.5px solid var(--border-subtle); border-radius: var(--radius-md);
      font-size: var(--text-base); font-family: inherit; color: var(--text-primary); background: var(--bg-base);
      transition: all 0.2s ease;
    }
    .form-group input::placeholder { color: var(--text-tertiary); }
    .form-group input:focus {
      outline: none; border-color: var(--color-primary);
      box-shadow: 0 0 0 3px oklch(85% 0.08 20 / 0.3);
    }

    .btn-primary {
      width: 100%; padding: var(--space-md) var(--space-xl);
      background: var(--color-primary); color: white; border: none;
      border-radius: var(--radius-md); font-size: var(--text-base);
      font-weight: 500; font-family: inherit; cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-primary:hover { background: var(--color-primary-deep); box-shadow: var(--shadow-md); transform: translateY(-1px); }

    .auth-footer {
      text-align: center; margin-top: var(--space-xl); padding-top: var(--space-xl);
      border-top: 1px solid var(--border-subtle);
      font-size: var(--text-sm); color: var(--text-secondary);
    }
    .auth-footer a { color: var(--color-primary); font-weight: 500; transition: color 0.2s ease; }
    .auth-footer a:hover { color: var(--color-primary-deep); text-decoration: underline; text-underline-offset: 3px; }

    @media (max-width: 800px) {
      .auth-page { grid-template-columns: 1fr; }
      .auth-brand { min-height: 180px; padding: var(--space-2xl); }
      .brand-logo { font-size: 3rem; }
      .brand-title { font-size: var(--text-2xl); }
      .auth-form-container { padding: var(--space-xl); }
    }

    a:focus-visible, button:focus-visible, input:focus-visible {
      outline: 2px solid var(--color-primary); outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-brand">
      <div class="brand-content">
        <span class="brand-logo" aria-hidden="true">🌱</span>
        <h1 class="brand-title">成长规划</h1>
        <p class="brand-desc">记录你的大学四年，见证每一步成长</p>
      </div>
    </div>

    <div class="auth-form-container">
      <div class="auth-card">
        <h2 class="form-title">创建账号</h2>
        <p class="form-subtitle">开启你的成长规划之旅</p>

        <form class="auth-form">
          <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" placeholder="设置你的用户名" autocomplete="username">
          </div>

          <div class="form-group">
            <label for="email">邮箱 / 学号</label>
            <input type="text" id="email" placeholder="请输入邮箱或学号" autocomplete="email">
          </div>

          <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" placeholder="设置登录密码（至少6位）" autocomplete="new-password">
          </div>

          <div class="form-group">
            <label for="confirm-password">确认密码</label>
            <input type="password" id="confirm-password" placeholder="再次输入密码" autocomplete="new-password">
          </div>

          <button type="submit" class="btn-primary">注册</button>
        </form>

        <div class="auth-footer">
          已有账号？<a href="login.html">直接登录</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
